<div class="auth-page">
  <div class="auth-left">
    <div class="illustration-card">
      <img
        src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
        alt="register illustration"
      />
      <h1>Créer un compte</h1>
      <p>
        Rejoignez la plateforme pour suivre des cours, publier du contenu pédagogique ou gérer
        l’espace d’apprentissage.
      </p>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <h2>Inscription</h2>
      <p class="subtitle">Créez votre compte en quelques secondes</p>

      <form (ngSubmit)="onRegister()">
        <div class="form-group">
          <label>Nom complet</label>
          <input type="text" [(ngModel)]="nom" name="nom" placeholder="Full name" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="e-mail address"
            required
          />
        </div>

        <div class="form-group">
          <label>Mot de passe</label>
          <input
            type="password"
            [(ngModel)]="motDePasse"
            name="motDePasse"
            placeholder="Password"
            required
          />
        </div>

        <div class="form-group">
          <label>Rôle</label>
          <select [(ngModel)]="role" name="role">
            <option value="ETUDIANT">Étudiant</option>
            <option value="FORMATEUR">Formateur</option>
          </select>
        </div>

        <button type="submit" [disabled]="loading">
          {{ loading ? 'Inscription...' : "S'inscrire" }}
        </button>

        <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <p class="switch-link">
          Déjà un compte ?
          <a routerLink="/login">Connexion</a>
        </p>
      </form>
    </div>
  </div>
</div>
