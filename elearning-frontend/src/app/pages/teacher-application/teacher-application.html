<div class="application-page">
  <div class="application-wrapper">
    <div class="application-header">
      <span class="badge">E-Learning Platform</span>
      <h1>Candidature Formateur</h1>
      <p>
        Complétez votre dossier professionnel pour permettre à l’administrateur d’examiner votre
        profil et valider votre accès à l’espace formateur.
      </p>
    </div>

    <div class="application-card">
      <form (ngSubmit)="onSubmit()">
        <div class="section">
          <h2>Informations professionnelles</h2>

          <div class="form-grid">
            <div class="form-group">
              <label for="specialite">Spécialité</label>
              <input
                id="specialite"
                type="text"
                [(ngModel)]="specialite"
                name="specialite"
                placeholder="Ex : Développement Web, Data Science..."
                required
              />
            </div>

            <div class="form-group">
              <label for="portfolio">Portfolio personnel</label>
              <input
                id="portfolio"
                type="text"
                [(ngModel)]="portfolio"
                name="portfolio"
                placeholder="https://mon-portfolio.com"
              />
            </div>

            <div class="form-group">
              <label for="github">GitHub</label>
              <input
                id="github"
                type="text"
                [(ngModel)]="github"
                name="github"
                placeholder="https://github.com/username"
              />
            </div>

            <div class="form-group">
              <label for="linkedin">LinkedIn</label>
              <input
                id="linkedin"
                type="text"
                [(ngModel)]="linkedin"
                name="linkedin"
                placeholder="https://linkedin.com/in/username"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="bio">Bio</label>
            <textarea
              id="bio"
              [(ngModel)]="bio"
              name="bio"
              rows="5"
              placeholder="Présentez brièvement votre parcours, vos compétences et votre expérience."
            ></textarea>
          </div>
        </div>

        <div class="section">
          <h2>Pièces justificatives</h2>

          <div class="form-grid">
            <div class="form-group">
              <label>CV (PDF)</label>
              <input type="file" (change)="onFileSelect($event, 'cv')" accept=".pdf" />
            </div>

            <div class="form-group">
              <label>Diplôme (PDF)</label>
              <input type="file" (change)="onFileSelect($event, 'diplome')" accept=".pdf" />
            </div>

            <div class="form-group">
              <label>Certificat (PDF)</label>
              <input type="file" (change)="onFileSelect($event, 'certificat')" accept=".pdf" />
            </div>

            <div class="form-group">
              <label>Attestation (PDF)</label>
              <input type="file" (change)="onFileSelect($event, 'attestation')" accept=".pdf" />
            </div>
          </div>
        </div>

        <div class="section">
          <h2>Motivation</h2>

          <div class="form-group">
            <label for="motivation">Pourquoi souhaitez-vous devenir formateur ?</label>
            <textarea
              id="motivation"
              [(ngModel)]="motivation"
              name="motivation"
              rows="6"
              placeholder="Expliquez votre motivation à rejoindre la plateforme."
            ></textarea>
          </div>
        </div>

        <div class="message success" *ngIf="successMessage">
          {{ successMessage }}
        </div>

        <div class="message error" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <div class="actions">
          <button type="submit" [disabled]="loading">
            {{ loading ? 'Envoi en cours...' : 'Envoyer ma candidature' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
